# Cloudflare Pages — RatingKino
# This file adds KV binding to Pages Functions (functions/api/[[path]].js).
# The same MOVIES_CACHE KV namespace is written by the sync Worker
# and read by the Pages Function at /api/cache/*.

name                   = "ratingkino"
pages_build_output_dir = "."
compatibility_date     = "2024-11-01"

[[kv_namespaces]]
binding = "MOVIES_CACHE"
id      = "9b1ddd3fe25446c390304fd3a460606e"

[ai]
binding = "AI"
