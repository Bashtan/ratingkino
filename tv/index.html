<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>FindFilm.ai — TV</title>
<link rel="icon" href="/favicon.ico">
<style>
  :root {
    --bg: #07070d;
    --text: #f4f1ff;
    --sub: rgba(244,241,255,0.62);
    --cyan: #06b6d4;
    --card: rgba(20,20,32,0.72);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  /* Full-bleed blurred backdrop */
  #bg {
    position: fixed; inset: -8%;
    background-size: cover; background-position: center;
    filter: blur(34px) brightness(0.42) saturate(1.15);
    transform: scale(1.1);
    transition: opacity 0.8s ease; opacity: 0;
    z-index: 0;
  }
  #bg.ready { opacity: 1; }
  #scrim {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(7,7,13,0.15) 0%, rgba(7,7,13,0.72) 65%, rgba(7,7,13,0.94) 100%);
  }
  /* Leanback stage */
  #stage {
    position: relative; z-index: 2;
    height: 100%; width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(16px, 3vh, 40px);
    padding: clamp(20px, 4vh, 64px) clamp(20px, 5vw, 90px);
    text-align: center;
  }
  /* Header: title + unified rating */
  #head {
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(10px, 1.6vh, 22px);
    max-width: 1400px;
  }
  #title {
    font-size: clamp(28px, 4.4vw, 68px);
    font-weight: 800; line-height: 1.05;
    letter-spacing: -0.5px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  #sub { font-size: clamp(13px, 1.5vw, 22px); color: var(--sub); font-weight: 500; }
  .rating-wrap {
    display: flex; align-items: center; gap: clamp(14px, 2vw, 30px);
    flex-wrap: wrap; justify-content: center;
  }
  .unified {
    display: flex; align-items: center; gap: clamp(10px, 1.2vw, 18px);
    background: var(--card);
    border: 2px solid var(--score-color, #22c55e);
    border-radius: 100px;
    padding: clamp(8px, 1.1vh, 16px) clamp(16px, 1.6vw, 28px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 0 30px -8px var(--score-color, #22c55e);
    backdrop-filter: blur(10px);
  }
  .unified .num {
    font-size: clamp(30px, 3.6vw, 58px); font-weight: 800;
    color: var(--score-color, #22c55e); line-height: 1;
  }
  .unified .lbl {
    text-align: left; font-size: clamp(10px, 1vw, 15px);
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--sub); font-weight: 700;
  }
  .unified .lbl b { display: block; color: var(--text); font-size: clamp(12px, 1.1vw, 17px); letter-spacing: 0.5px; }
  .src-chips { display: flex; gap: clamp(8px, 1vw, 16px); flex-wrap: wrap; justify-content: center; }
  .src-chip {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: clamp(5px, 0.7vh, 10px) clamp(11px, 1vw, 18px);
    font-size: clamp(12px, 1.15vw, 18px); font-weight: 700;
  }
  .src-chip span { color: var(--sub); font-weight: 600; font-size: 0.82em; }
  /* Trailer player */
  #player {
    position: relative;
    width: min(74vw, 132vh);
    aspect-ratio: 16 / 9;
    border-radius: clamp(10px, 1.4vw, 22px);
    overflow: hidden;
    background: #000;
    box-shadow: 0 30px 90px -20px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  }
  #player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  #noTrailer {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--sub); font-size: clamp(14px, 1.4vw, 22px); font-weight: 600;
  }
  /* Overview */
  #overview {
    max-width: 900px; color: var(--sub);
    font-size: clamp(13px, 1.35vw, 20px); line-height: 1.55; font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  /* Brand watermark */
  #brand {
    position: fixed; bottom: clamp(14px, 2.4vh, 30px); right: clamp(16px, 2.4vw, 34px);
    z-index: 3; display: flex; align-items: center; gap: 8px;
    color: var(--sub); font-weight: 800; font-size: clamp(12px, 1.1vw, 17px);
    letter-spacing: 0.5px; opacity: 0.75;
  }
  #brand b { color: var(--cyan); }
  /* States */
  #loader {
    position: fixed; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .spin {
    width: 54px; height: 54px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.14);
    border-top-color: var(--cyan);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #errbox {
    display: none; z-index: 4; position: relative;
    max-width: 620px; color: var(--text);
  }
  #errbox h1 { font-size: clamp(22px, 3vw, 40px); margin-bottom: 12px; }
  #errbox p { color: var(--sub); font-size: clamp(14px, 1.4vw, 20px); }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="scrim"></div>

  <div id="loader"><div class="spin"></div></div>

  <div id="stage" style="display:none">
    <div id="head">
      <div id="title"></div>
      <div id="sub"></div>
      <div class="rating-wrap">
        <div class="unified" id="unified" style="display:none">
          <div class="num" id="uNum">—</div>
          <div class="lbl">FindFilm<br><b>Unified Rating</b></div>
        </div>
        <div class="src-chips" id="srcChips"></div>
      </div>
    </div>

    <div id="player">
      <div id="noTrailer" style="display:none">Trailer unavailable</div>
    </div>

    <div id="overview"></div>
  </div>

  <div id="errbox">
    <h1>Nothing to play</h1>
    <p>This TV link is missing a valid movie. Head back to FindFilm.ai and cast again.</p>
  </div>

  <div id="brand">✦ FindFilm<b>.ai</b></div>

<script>
/* ── Leanback TV receiver. Standalone — NOT a mirror of the main app. ──
   Reads the movie id from /tv/{id} (rewrite) or ?m={id}, fetches TMDB +
   OMDb through the site's own /api proxy, shows a blurred backdrop, the
   unified rating (same weighted formula as the app), and an autoplaying
   fullscreen trailer. */
(function () {
  var TIMG_ORIG = 'https://image.tmdb.org/t/p/original';
  var TIMG_W1280 = 'https://image.tmdb.org/t/p/w1280';

  function getMovieId() {
    var m = location.pathname.match(/\/tv\/(\d+)/);
    if (m) return m[1];
    var q = new URLSearchParams(location.search).get('m');
    return q && /^\d+$/.test(q) ? q : null;
  }

  function scoreColor(v) {
    if (v >= 7.5) return '#22c55e';
    if (v >= 6)   return '#eab308';
    if (v >= 4)   return '#f97316';
    return '#ef4444';
  }

  // Same weighted blend as the main app's calcAvg().
  function unifiedRating(r) {
    var srcs = [];
    if (r.imdb > 0) srcs.push({ v: r.imdb,    w: r.imdbV || 1000 });
    if (r.rt   > 0) srcs.push({ v: r.rt / 10, w: 1000 });
    if (r.mc   > 0) srcs.push({ v: r.mc / 10, w: 1000 });
    if (!srcs.length) return r.tmdb > 0 ? r.tmdb : null;
    var tw = srcs.reduce(function (s, x) { return s + x.w; }, 0);
    var sv = srcs.reduce(function (s, x) { return s + x.v * x.w; }, 0);
    return sv / tw;
  }

  function showError() {
    document.getElementById('loader').style.display = 'none';
    var st = document.querySelectorAll('#stage'); st.forEach(function (n) { n.style.display = 'none'; });
    document.getElementById('errbox').style.display = 'block';
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"]/g, function (c) { return ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' })[c]; }); }

  async function main() {
    var id = getMovieId();
    if (!id) return showError();

    var detail;
    try {
      var res = await fetch('/api/tmdb/movie/' + id + '?append_to_response=videos,external_ids&language=en-US');
      if (!res.ok) throw new Error('tmdb ' + res.status);
      detail = await res.json();
    } catch (e) {
      console.warn('[tv] detail fetch failed:', e.message);
      return showError();
    }

    // OMDb for IMDb/RT/Metacritic (best-effort).
    var ratings = { imdb: 0, imdbV: 0, rt: 0, mc: 0, tmdb: detail.vote_average || 0 };
    if (detail.imdb_id) {
      try {
        var or = await fetch('/api/omdb?i=' + detail.imdb_id);
        if (or.ok) {
          var od = await or.json();
          var iv = parseFloat(od.imdbRating);
          if (!isNaN(iv) && iv > 0) { ratings.imdb = iv; ratings.imdbV = parseInt((od.imdbVotes || '0').replace(/,/g, '')) || 1000; }
          (od.Ratings || []).forEach(function (x) {
            if (x.Source === 'Rotten Tomatoes') { var rt = parseInt(x.Value); if (!isNaN(rt)) ratings.rt = rt; }
          });
          var mc = parseInt(od.Metascore);
          if (!isNaN(mc) && mc > 0) ratings.mc = mc;
        }
      } catch (e) { /* OMDb optional */ }
    }

    render(detail, ratings);
  }

  function render(d, r) {
    // Backdrop
    var bg = document.getElementById('bg');
    var backdrop = d.backdrop_path ? (TIMG_ORIG + d.backdrop_path) : (d.poster_path ? TIMG_W1280 + d.poster_path : null);
    if (backdrop) {
      var img = new Image();
      img.onload = function () { bg.style.backgroundImage = 'url("' + backdrop + '")'; bg.classList.add('ready'); };
      img.onerror = function () { if (d.poster_path) { bg.style.backgroundImage = 'url("' + TIMG_W1280 + d.poster_path + '")'; bg.classList.add('ready'); } };
      img.src = backdrop;
    }

    // Title + meta
    document.getElementById('title').textContent = d.title || d.original_title || 'Untitled';
    var year = (d.release_date || '').slice(0, 4);
    var genres = (d.genres || []).slice(0, 3).map(function (g) { return g.name; }).join(' · ');
    document.getElementById('sub').textContent = [year, genres, d.runtime ? d.runtime + ' min' : ''].filter(Boolean).join('   •   ');

    // Unified rating
    var u = unifiedRating(r);
    if (u != null) {
      var col = scoreColor(u);
      var uni = document.getElementById('unified');
      uni.style.setProperty('--score-color', col);
      document.getElementById('uNum').textContent = u.toFixed(1);
      uni.style.display = 'flex';
    }

    // Source chips
    var chips = [];
    if (r.imdb > 0) chips.push('<div class="src-chip"><span>IMDb</span> ' + r.imdb.toFixed(1) + '</div>');
    if (r.rt   > 0) chips.push('<div class="src-chip"><span>RT</span> ' + r.rt + '%</div>');
    if (r.mc   > 0) chips.push('<div class="src-chip"><span>Metacritic</span> ' + r.mc + '</div>');
    document.getElementById('srcChips').innerHTML = chips.join('');

    // Overview
    document.getElementById('overview').textContent = d.overview || '';

    // Trailer (autoplay, muted to satisfy autoplay policies; TV remote can unmute)
    var vids = (d.videos && d.videos.results) || [];
    var trl = vids.find(function (v) { return v.site === 'YouTube' && v.type === 'Trailer'; })
           || vids.find(function (v) { return v.site === 'YouTube' && v.type === 'Teaser'; })
           || vids.find(function (v) { return v.site === 'YouTube'; });
    var player = document.getElementById('player');
    if (trl) {
      var src = 'https://www.youtube.com/embed/' + trl.key +
        '?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3';
      var f = document.createElement('iframe');
      f.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture; fullscreen');
      f.setAttribute('allowfullscreen', '');
      f.setAttribute('title', 'Trailer');
      f.src = src;
      player.appendChild(f);
    } else {
      document.getElementById('noTrailer').style.display = 'flex';
    }

    document.getElementById('loader').style.display = 'none';
    document.querySelector('#stage').style.display = 'flex';
    document.title = (d.title || 'FindFilm') + ' — FindFilm.ai TV';
  }

  main();
})();
</script>
</body>
</html>
